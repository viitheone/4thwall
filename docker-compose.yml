# 4thwall WAF - Docker Compose
# Nginx (WAF) + FastAPI + Dashboard frontend + optional DVWA

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=./models/waf_model
      - DECISION_LOG=/app/logs/decision_log.json
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "80:80"
    environment:
      # If the image supports it, proxy to DVWA (otherwise image uses its default)
      - BACKEND=http://dvwa:80
    volumes:
      # Do not mount over /etc/nginx/nginx.conf - image entrypoint must write it
      - ./logs:/var/log/nginx
    depends_on:
      - dvwa
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8080:80"
    restart: unless-stopped
