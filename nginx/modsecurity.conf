# ModSecurity - detection only (no blocking) for demo
# Include OWASP CRS when available; basic rule references

SecRuleEngine DetectionOnly
SecAuditEngine RelevantOnly
SecAuditLogType Serial
SecAuditLog logs/modsec_audit.log

# Basic rules (placeholder - full CRS in crs-setup.conf / rules/)
# SQLi
SecRule ARGS "@rx (?i)(union|select|insert|drop|delete)\s" "id:1000,phase:2,log,msg:'Possible SQLi'"
# XSS
SecRule ARGS "@rx (?i)<script" "id:1001,phase:2,log,msg:'Possible XSS'"

# Include OWASP CRS if present (uncomment and set path)
# Include /etc/nginx/owasp-crs/crs-setup.conf
# Include /etc/nginx/owasp-crs/rules/*.conf
