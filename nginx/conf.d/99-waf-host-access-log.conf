# Host bind: ./logs -> /var/log/nginx/waf (see docker-compose.yml)

log_format waf_json_4thwall escape=json '{'
    '"time": "$time_iso8601",'
    '"method": "$request_method",'
    '"path": "$uri",'
    '"query": "$args",'
    '"status": $status,'
    '"user_agent": "$http_user_agent",'
    '"request_time": $request_time'
'}';

access_log /var/log/nginx/waf/access.log waf_json_4thwall;
